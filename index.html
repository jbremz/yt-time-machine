<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YT Time Machine</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a2e;
    --surface2: #16213e;
    --accent: #e94560;
    --accent2: #0f3460;
    --text: #eee;
    --text-dim: #999;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, var(--surface) 0%, var(--surface2) 100%);
    padding: 24px 32px;
    border-bottom: 2px solid var(--accent);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header h1 {
    font-size: 28px;
    font-weight: 700;
    margin-bottom: 16px;
  }
  .header h1 span { color: var(--accent); }

  /* Controls */
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
  }
  .control-group {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .control-group label {
    font-size: 13px;
    color: var(--text-dim);
    white-space: nowrap;
  }
  input[type="date"], input[type="text"], select {
    background: var(--bg);
    border: 1px solid #333;
    color: var(--text);
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 14px;
    outline: none;
  }
  input[type="date"]:focus, input[type="text"]:focus, select:focus {
    border-color: var(--accent);
  }
  input[type="text"] { width: 200px; }
  button {
    background: var(--accent);
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    font-weight: 600;
    transition: opacity .15s;
  }
  button:hover { opacity: .85; }
  button.secondary {
    background: var(--accent2);
  }
  button.active {
    box-shadow: 0 0 0 2px var(--accent);
  }

  /* Time Machine strip */
  .time-machine {
    background: var(--surface);
    padding: 12px 32px;
    border-bottom: 1px solid #222;
    overflow-x: auto;
    white-space: nowrap;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .time-machine .label {
    font-size: 13px;
    color: var(--accent);
    font-weight: 700;
    margin-right: 4px;
    flex-shrink: 0;
  }
  .tm-btn {
    background: var(--accent2);
    font-size: 13px;
    padding: 6px 14px;
    border-radius: 20px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .tm-btn.active {
    background: var(--accent);
  }
  .today-card {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    margin-right: 8px;
  }
  .cal {
    width: 48px;
    border-radius: 8px;
    overflow: hidden;
    background: #fff;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,.3);
    flex-shrink: 0;
  }
  .cal-month {
    background: var(--accent);
    color: white;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    padding: 2px 0;
    letter-spacing: .5px;
  }
  .cal-day {
    color: #111;
    font-size: 22px;
    font-weight: 700;
    padding: 2px 0 4px;
    line-height: 1;
  }
  .cal-dow {
    color: #666;
    font-size: 9px;
    padding-bottom: 3px;
  }
  .today-text {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.4;
  }
  .today-text strong {
    color: var(--text);
    font-size: 14px;
  }

  /* Stats bar */
  .stats {
    padding: 10px 32px;
    font-size: 13px;
    color: var(--text-dim);
    background: var(--surface2);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }

  /* Layout */
  .main {
    display: flex;
    height: calc(100vh - 220px);
    min-height: 500px;
  }

  /* Player */
  .player-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #000;
    min-width: 0;
  }
  .player-container {
    flex: 1;
    position: relative;
    background: #000;
  }
  #ytPlayer, .player-container iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    border: none;
    z-index: 1;
  }
  .player-placeholder {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    text-align: center;
    padding: 32px;
  }
  .player-placeholder .big { font-size: 64px; margin-bottom: 16px; }
  .now-playing {
    padding: 12px 16px;
    background: var(--surface);
    border-top: 1px solid #222;
  }
  .now-playing .title {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .now-playing .meta {
    font-size: 12px;
    color: var(--text-dim);
  }
  .player-controls {
    display: flex;
    gap: 8px;
    padding: 8px 16px;
    background: var(--surface);
    border-top: 1px solid #1a1a1a;
    align-items: center;
  }
  .player-controls button {
    font-size: 18px;
    padding: 6px 14px;
    background: var(--accent2);
  }
  .player-controls .autoplay-toggle {
    margin-left: auto;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text-dim);
  }
  .switch {
    position: relative;
    width: 40px;
    height: 22px;
    cursor: pointer;
  }
  .switch input { display: none; }
  .switch .slider {
    position: absolute;
    inset: 0;
    background: #333;
    border-radius: 22px;
    transition: background .2s;
  }
  .switch .slider::before {
    content: '';
    position: absolute;
    width: 16px; height: 16px;
    left: 3px; top: 3px;
    background: white;
    border-radius: 50%;
    transition: transform .2s;
  }
  .switch input:checked + .slider { background: var(--accent); }
  .switch input:checked + .slider::before { transform: translateX(18px); }
  .shortcuts-hint {
    margin-left: 16px;
    font-size: 11px;
    color: #666;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  kbd {
    background: #222;
    border: 1px solid #444;
    border-radius: 4px;
    padding: 1px 5px;
    font-family: inherit;
    font-size: 10px;
    color: var(--text-dim);
    margin-right: 2px;
  }

  /* Sidebar / playlist */
  .sidebar {
    width: 380px;
    background: var(--surface);
    border-left: 1px solid #222;
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  .sidebar-header {
    padding: 12px 16px;
    font-size: 14px;
    font-weight: 600;
    border-bottom: 1px solid #222;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .video-list {
    flex: 1;
    overflow-y: auto;
    scroll-behavior: smooth;
  }
  .video-item {
    padding: 10px 16px;
    border-bottom: 1px solid #1a1a1a;
    cursor: pointer;
    transition: background .1s;
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .video-item:hover { background: var(--surface2); }
  .video-item.active { background: var(--accent2); border-left: 3px solid var(--accent); }
  .video-item .thumb {
    width: 120px;
    height: 68px;
    border-radius: 6px;
    object-fit: cover;
    flex-shrink: 0;
    background: #222;
  }
  .video-item .info { min-width: 0; }
  .video-item .info .title {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 4px;
  }
  .video-item .info .channel {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 2px;
  }
  .video-item .info .date {
    font-size: 11px;
    color: #666;
  }

  /* Load-more sentinel */
  .load-more {
    text-align: center;
    padding: 20px;
    color: var(--text-dim);
    font-size: 13px;
  }

  /* Shuffle badge */
  .shuffle-badge {
    display: inline-block;
    background: var(--accent);
    color: white;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    margin-left: 8px;
  }

  /* Calendar picker */
  .cal-picker-wrap {
    position: relative;
    display: inline-block;
  }
  .cal-picker-btn {
    background: var(--accent2);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .cal-picker {
    position: absolute;
    top: calc(100% + 8px);
    left: 0;
    background: var(--surface);
    border: 1px solid #333;
    border-radius: 12px;
    padding: 16px;
    z-index: 200;
    box-shadow: 0 8px 32px rgba(0,0,0,.5);
    width: 300px;
    display: none;
  }
  .cal-picker.open { display: block; }
  .cal-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .cal-nav button {
    background: none;
    color: var(--text);
    font-size: 18px;
    padding: 4px 10px;
    border-radius: 6px;
  }
  .cal-nav button:hover { background: var(--surface2); }
  .cal-nav .cal-month-label {
    font-size: 15px;
    font-weight: 600;
  }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    text-align: center;
  }
  .cal-grid .dow {
    font-size: 10px;
    color: #666;
    padding: 4px 0;
    font-weight: 600;
  }
  .cal-grid .day {
    font-size: 12px;
    padding: 6px 0;
    border-radius: 6px;
    cursor: pointer;
    position: relative;
    color: var(--text-dim);
    transition: background .1s;
  }
  .cal-grid .day:hover { background: var(--surface2); }
  .cal-grid .day.empty { cursor: default; }
  .cal-grid .day.empty:hover { background: none; }
  .cal-grid .day.has-videos { color: var(--text); font-weight: 600; }
  .cal-grid .day.has-videos::after {
    content: '';
    position: absolute;
    bottom: 2px;
    left: 50%;
    transform: translateX(-50%);
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #4caf50;
  }
  .cal-grid .day.has-many::after { width: 8px; border-radius: 4px; background: #4caf50; }
  .cal-grid .day.selected {
    background: var(--accent);
    color: white;
  }
  .cal-grid .day.in-range {
    background: var(--accent2);
    color: var(--text);
  }
  .cal-grid .day.today {
    box-shadow: inset 0 0 0 1px var(--accent);
  }
  .cal-range-hint {
    margin-top: 10px;
    font-size: 11px;
    color: #666;
    text-align: center;
  }

  /* Responsive */
  @media (max-width: 900px) {
    .main { flex-direction: column; height: auto; }
    .sidebar { width: 100%; border-left: none; border-top: 1px solid #222; max-height: 50vh; }
    .player-container { aspect-ratio: 16/9; }
    .header { padding: 16px; }
    .time-machine { padding: 10px 16px; }
    .stats { padding: 8px 16px; }
    .controls { gap: 8px; }
    input[type="text"] { width: 150px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1><span>YT</span> Time Machine</h1>
  <div class="controls">
    <div class="control-group">
      <label>From</label>
      <input type="date" id="dateFrom">
    </div>
    <div class="control-group">
      <label>To</label>
      <input type="date" id="dateTo">
    </div>
    <div class="control-group">
      <label>Search</label>
      <input type="text" id="search" placeholder="Title or channel...">
    </div>
    <div class="cal-picker-wrap">
      <button id="calBtn" class="cal-picker-btn">&#x1F4C5; Calendar</button>
      <div class="cal-picker" id="calPicker">
        <div class="cal-nav">
          <button id="calPrev">&#x25C0;</button>
          <span class="cal-month-label" id="calMonthLabel"></span>
          <button id="calNext">&#x25B6;</button>
        </div>
        <div class="cal-grid" id="calGrid"></div>
        <div class="cal-range-hint">Click a day, or click two days to set a range</div>
      </div>
    </div>
    <button id="applyBtn">Apply</button>
    <button id="clearBtn" class="secondary">Clear</button>
    <button id="shuffleBtn" class="secondary">Shuffle</button>
    <button id="randomDayBtn" class="secondary">Random Day</button>
  </div>
</div>

<div class="time-machine" id="timeMachine">
  <span class="label">This day in...</span>
</div>

<div class="stats" id="stats">
  <span id="statText">Loading...</span>
</div>

<div class="main">
  <div class="player-area">
    <div class="player-container" id="playerContainer">
      <div id="ytPlayer"></div>
      <div class="player-placeholder" id="placeholder">
        <div class="big">&#x1F4FC;</div>
        <div>Pick a video from the list or try "This day in..." to travel back in time</div>
      </div>
    </div>
    <div class="now-playing" id="nowPlaying" style="display:none;">
      <div class="title" id="npTitle"></div>
      <div class="meta" id="npMeta"></div>
    </div>
    <div class="player-controls">
      <button id="prevBtn" title="Previous">&#x23EE;</button>
      <button id="nextBtn" title="Next">&#x23ED;</button>
      <div class="autoplay-toggle">
        <span>Autoplay</span>
        <label class="switch">
          <input type="checkbox" id="autoplayToggle" checked>
          <span class="slider"></span>
        </label>
      </div>
      <div class="shortcuts-hint">
        <kbd>Shift+N</kbd> next
        <kbd>Shift+P</kbd> prev
        <kbd>Shift+S</kbd> shuffle
        <kbd>Shift+R</kbd> random day
      </div>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-header">
      <span id="playlistLabel">Videos</span>
    </div>
    <div class="video-list" id="videoList"></div>
  </div>
</div>

<script>
const BATCH_SIZE = 50;

let allData = [];
let filtered = [];
let displayedCount = 0;
let currentIndex = -1;
let player = null;
let autoplay = true;
let playerReady = false;
let pendingPlayIndex = -1;

// Parse "21 Feb 2026, 10:18:44 GMT" into a Date
function parseDate(str) {
  return new Date(str);
}

function fmtDate(d) {
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

function fmtDateTime(d) {
  return d.toLocaleDateString('en-GB', {
    day: 'numeric', month: 'short', year: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });
}

// Load data
async function init() {
  const res = await fetch('data.json');
  allData = await res.json();

  // Pre-parse dates
  allData.forEach(e => { e._date = parseDate(e.date); });

  // Set date range inputs
  const dates = allData.map(e => e._date).filter(d => !isNaN(d));
  const minDate = new Date(Math.min(...dates));
  const maxDate = new Date(Math.max(...dates));
  document.getElementById('dateFrom').value = toInputDate(minDate);
  document.getElementById('dateTo').value = toInputDate(maxDate);

  filtered = [...allData];
  buildTimeMachine();
  buildVideosPerDay();

  // Load YouTube IFrame API
  loadYTAPI();

  // Start on a random day
  randomDay();
}

function toInputDate(d) {
  return d.toISOString().slice(0, 10);
}

function fromInputDate(s) {
  const [y, m, d] = s.split('-').map(Number);
  return new Date(y, m - 1, d);
}

// "This day in..." buttons
function buildTimeMachine() {
  const container = document.getElementById('timeMachine');
  const today = new Date();
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

  container.innerHTML = `
    <div class="today-card">
      <div class="cal">
        <div class="cal-month">${months[today.getMonth()]}</div>
        <div class="cal-day">${today.getDate()}</div>
        <div class="cal-dow">${days[today.getDay()]}</div>
      </div>
      <div class="today-text">
        <strong>On this day</strong><br>
        What were you watching?
      </div>
    </div>
  `;
  const month = today.getMonth();
  const day = today.getDate();

  // Collect years that have entries on this day
  const yearSet = new Set();
  allData.forEach(e => {
    if (e._date.getMonth() === month && e._date.getDate() === day) {
      yearSet.add(e._date.getFullYear());
    }
  });

  const years = [...yearSet].sort((a, b) => b - a);
  if (years.length === 0) {
    container.innerHTML += '<span style="color:#666;font-size:13px;">No videos on this date in previous years</span>';
    return;
  }

  years.forEach(year => {
    const btn = document.createElement('button');
    btn.className = 'tm-btn';
    btn.textContent = year;
    btn.addEventListener('click', () => {
      // Deactivate others
      container.querySelectorAll('.tm-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filterThisDay(year);
    });
    container.appendChild(btn);
  });
}

function filterThisDay(year) {
  const today = new Date();
  const month = today.getMonth();
  const day = today.getDate();

  filtered = allData.filter(e =>
    e._date.getFullYear() === year &&
    e._date.getMonth() === month &&
    e._date.getDate() === day
  );

  displayedCount = 0;
  document.getElementById('videoList').innerHTML = '';
  renderStats();
  renderBatch();

  // Update date inputs to reflect
  const d = new Date(year, month, day);
  document.getElementById('dateFrom').value = toInputDate(d);
  document.getElementById('dateTo').value = toInputDate(d);
  document.getElementById('search').value = '';
  currentIndex = -1;
}

// Apply filters
function applyFilters() {
  const from = fromInputDate(document.getElementById('dateFrom').value);
  const to = fromInputDate(document.getElementById('dateTo').value);
  to.setHours(23, 59, 59, 999);
  const search = document.getElementById('search').value.toLowerCase().trim();

  filtered = allData.filter(e => {
    if (e._date < from || e._date > to) return false;
    if (search) {
      const haystack = (e.title + ' ' + (e.channel || '')).toLowerCase();
      if (!haystack.includes(search)) return false;
    }
    return true;
  });

  // Clear "this day in" active
  document.querySelectorAll('.tm-btn').forEach(b => b.classList.remove('active'));

  displayedCount = 0;
  document.getElementById('videoList').innerHTML = '';
  currentIndex = -1;
  renderStats();
  renderBatch();
}

function clearFilters() {
  const dates = allData.map(e => e._date).filter(d => !isNaN(d));
  document.getElementById('dateFrom').value = toInputDate(new Date(Math.min(...dates)));
  document.getElementById('dateTo').value = toInputDate(new Date(Math.max(...dates)));
  document.getElementById('search').value = '';
  document.querySelectorAll('.tm-btn').forEach(b => b.classList.remove('active'));
  filtered = [...allData];
  displayedCount = 0;
  document.getElementById('videoList').innerHTML = '';
  currentIndex = -1;
  renderStats();
  renderBatch();
}

function shuffleFiltered() {
  // Fisher-Yates on a copy
  filtered = [...filtered];
  for (let i = filtered.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [filtered[i], filtered[j]] = [filtered[j], filtered[i]];
  }
  displayedCount = 0;
  document.getElementById('videoList').innerHTML = '';
  currentIndex = -1;
  renderStats();
  renderBatch();
}

function randomDay() {
  // Pick a random entry and show that whole day
  const entry = allData[Math.floor(Math.random() * allData.length)];
  const d = entry._date;
  const year = d.getFullYear();
  const month = d.getMonth();
  const day = d.getDate();

  filtered = allData.filter(e =>
    e._date.getFullYear() === year &&
    e._date.getMonth() === month &&
    e._date.getDate() === day
  );

  const dayDate = new Date(year, month, day);
  document.getElementById('dateFrom').value = toInputDate(dayDate);
  document.getElementById('dateTo').value = toInputDate(dayDate);
  document.getElementById('search').value = '';
  document.querySelectorAll('.tm-btn').forEach(b => b.classList.remove('active'));

  displayedCount = 0;
  document.getElementById('videoList').innerHTML = '';
  currentIndex = -1;
  renderStats();
  renderBatch();
}

function renderStats() {
  const text = `Showing ${filtered.length.toLocaleString()} videos`;
  let range = '';
  if (filtered.length > 0) {
    const first = filtered[filtered.length - 1];
    const last = filtered[0];
    range = ` from ${fmtDate(first._date)} to ${fmtDate(last._date)}`;
  }
  document.getElementById('statText').textContent = text + range;
  document.getElementById('playlistLabel').textContent = `Videos (${filtered.length.toLocaleString()})`;
}

// Virtual scrolling: render in batches
function renderBatch() {
  const list = document.getElementById('videoList');
  const end = Math.min(displayedCount + BATCH_SIZE, filtered.length);

  for (let i = displayedCount; i < end; i++) {
    const e = filtered[i];
    const item = document.createElement('div');
    item.className = 'video-item';
    item.dataset.index = i;

    item.innerHTML = `
      <img class="thumb" src="https://i.ytimg.com/vi/${e.id}/mqdefault.jpg"
           loading="lazy" alt=""
           onerror="this.style.display='none'">
      <div class="info">
        <div class="title">${escHtml(e.title)}</div>
        <div class="channel">${escHtml(e.channel || 'Unknown')}</div>
        <div class="date">${fmtDateTime(e._date)}</div>
      </div>
    `;
    item.addEventListener('click', () => playIndex(i));
    list.appendChild(item);
  }

  displayedCount = end;

  // Remove old sentinel
  const old = list.querySelector('.load-more');
  if (old) old.remove();

  if (displayedCount < filtered.length) {
    const sentinel = document.createElement('div');
    sentinel.className = 'load-more';
    sentinel.textContent = `Scroll for more (${filtered.length - displayedCount} remaining)`;
    list.appendChild(sentinel);
    observeSentinel(sentinel);
  }
}

let observer;
function observeSentinel(el) {
  if (observer) observer.disconnect();
  observer = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting) {
      observer.disconnect();
      renderBatch();
    }
  }, { root: document.getElementById('videoList'), rootMargin: '200px' });
  observer.observe(el);
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// YouTube IFrame API
function loadYTAPI() {
  const tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);
}

window.onYouTubeIframeAPIReady = function() {
  playerReady = true;
  // If user clicked a video before API was ready, play it now
  if (pendingPlayIndex !== -1) {
    playIndex(pendingPlayIndex);
    pendingPlayIndex = -1;
  }
};

function playIndex(idx) {
  if (idx < 0 || idx >= filtered.length) return;
  currentIndex = idx;
  const entry = filtered[idx];

  // Highlight in list
  document.querySelectorAll('.video-item').forEach(el => el.classList.remove('active'));
  const activeEl = document.querySelector(`.video-item[data-index="${idx}"]`);
  if (activeEl) {
    activeEl.classList.add('active');
    activeEl.scrollIntoView({ block: 'nearest' });
  }

  // Ensure the item is rendered (might need to render more batches)
  if (idx >= displayedCount) {
    // Render up to this index
    while (displayedCount <= idx) renderBatch();
    const el = document.querySelector(`.video-item[data-index="${idx}"]`);
    if (el) {
      el.classList.add('active');
      el.scrollIntoView({ block: 'nearest' });
    }
  }

  // Show now-playing info
  document.getElementById('nowPlaying').style.display = 'block';
  document.getElementById('npTitle').textContent = entry.title;
  document.getElementById('npMeta').textContent =
    `${entry.channel || 'Unknown'} · ${fmtDateTime(entry._date)}`;

  // Hide placeholder
  document.getElementById('placeholder').style.display = 'none';

  // Play video
  if (player) {
    player.loadVideoById(entry.id);
  } else if (playerReady) {
    player = new YT.Player('ytPlayer', {
      width: '100%',
      height: '100%',
      videoId: entry.id,
      playerVars: {
        autoplay: 1,
        modestbranding: 1,
        rel: 0,
      },
      events: {
        onStateChange: onPlayerStateChange,
      }
    });
  } else {
    // API not loaded yet — queue it
    pendingPlayIndex = idx;
  }
}

function onPlayerStateChange(event) {
  // YT.PlayerState.ENDED = 0
  if (event.data === 0 && autoplay) {
    playNext();
  }
}

function playNext() {
  if (currentIndex < filtered.length - 1) {
    playIndex(currentIndex + 1);
  }
}

function playPrev() {
  if (currentIndex > 0) {
    playIndex(currentIndex - 1);
  }
}

// Calendar picker
let calViewDate = new Date(); // month being viewed
let calSelectStart = null;   // first clicked date
let calSelectEnd = null;     // second clicked date (range end)
let videosPerDay = {};       // "YYYY-MM-DD" -> count

function buildVideosPerDay() {
  videosPerDay = {};
  allData.forEach(e => {
    const key = toInputDate(e._date);
    videosPerDay[key] = (videosPerDay[key] || 0) + 1;
  });
}

function renderCalendar() {
  const grid = document.getElementById('calGrid');
  const label = document.getElementById('calMonthLabel');
  const year = calViewDate.getFullYear();
  const month = calViewDate.getMonth();
  const months = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];

  label.textContent = `${months[month]} ${year}`;

  let html = '';
  ['Mo','Tu','We','Th','Fr','Sa','Su'].forEach(d => {
    html += `<div class="dow">${d}</div>`;
  });

  const firstDay = new Date(year, month, 1);
  // Monday-based: 0=Mon, 6=Sun
  let startDow = (firstDay.getDay() + 6) % 7;
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  const today = new Date();
  const todayKey = toInputDate(today);

  // Normalize selection range
  let rangeStart = calSelectStart;
  let rangeEnd = calSelectEnd;
  if (rangeStart && rangeEnd && rangeStart > rangeEnd) {
    [rangeStart, rangeEnd] = [rangeEnd, rangeStart];
  }

  for (let i = 0; i < startDow; i++) {
    html += '<div class="day empty"></div>';
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(year, month, d);
    const key = toInputDate(date);
    const count = videosPerDay[key] || 0;
    const classes = ['day'];

    if (count > 0) classes.push('has-videos');
    if (count >= 10) classes.push('has-many');
    if (key === todayKey) classes.push('today');

    // Selection highlighting
    if (rangeStart && rangeEnd) {
      const rangeStartKey = toInputDate(rangeStart);
      const rangeEndKey = toInputDate(rangeEnd);
      if (key === rangeStartKey || key === rangeEndKey) {
        classes.push('selected');
      } else if (date > rangeStart && date < rangeEnd) {
        classes.push('in-range');
      }
    } else if (rangeStart && toInputDate(rangeStart) === key) {
      classes.push('selected');
    }

    const title = count > 0 ? `${count} video${count > 1 ? 's' : ''}` : 'No videos';
    html += `<div class="${classes.join(' ')}" data-date="${key}" title="${title}">${d}</div>`;
  }

  grid.innerHTML = html;

  // Attach click handlers to day cells
  grid.querySelectorAll('.day:not(.empty)').forEach(el => {
    el.addEventListener('click', () => {
      const dateStr = el.dataset.date;
      const [y, m, dd] = dateStr.split('-').map(Number);
      const clicked = new Date(y, m - 1, dd);

      if (!calSelectStart || calSelectEnd) {
        // Start new selection
        calSelectStart = clicked;
        calSelectEnd = null;
      } else {
        // Complete range
        calSelectEnd = clicked;
        // Apply the range as filter
        let from = calSelectStart;
        let to = calSelectEnd;
        if (from > to) [from, to] = [to, from];
        document.getElementById('dateFrom').value = toInputDate(from);
        document.getElementById('dateTo').value = toInputDate(to);
        applyFilters();
      }
      renderCalendar();
    });
  });
}

document.getElementById('calBtn').addEventListener('click', e => {
  e.stopPropagation();
  const picker = document.getElementById('calPicker');
  const isOpen = picker.classList.contains('open');
  if (isOpen) {
    picker.classList.remove('open');
  } else {
    if (Object.keys(videosPerDay).length === 0) buildVideosPerDay();
    // Start on current "from" date month
    const fromVal = document.getElementById('dateFrom').value;
    if (fromVal) {
      const [y, m] = fromVal.split('-').map(Number);
      calViewDate = new Date(y, m - 1, 1);
    }
    calSelectStart = null;
    calSelectEnd = null;
    renderCalendar();
    picker.classList.add('open');
  }
});

document.getElementById('calPrev').addEventListener('click', e => {
  e.stopPropagation();
  calViewDate.setMonth(calViewDate.getMonth() - 1);
  renderCalendar();
});

document.getElementById('calNext').addEventListener('click', e => {
  e.stopPropagation();
  calViewDate.setMonth(calViewDate.getMonth() + 1);
  renderCalendar();
});

// Close calendar when clicking outside
document.addEventListener('click', e => {
  const picker = document.getElementById('calPicker');
  const wrap = e.target.closest('.cal-picker-wrap');
  if (!wrap && picker.classList.contains('open')) {
    picker.classList.remove('open');
  }
});

// Event listeners
document.getElementById('applyBtn').addEventListener('click', applyFilters);
document.getElementById('clearBtn').addEventListener('click', clearFilters);
document.getElementById('shuffleBtn').addEventListener('click', shuffleFiltered);
document.getElementById('randomDayBtn').addEventListener('click', randomDay);
document.getElementById('nextBtn').addEventListener('click', playNext);
document.getElementById('prevBtn').addEventListener('click', playPrev);
document.getElementById('autoplayToggle').addEventListener('change', e => {
  autoplay = e.target.checked;
});

// Enter key in search
document.getElementById('search').addEventListener('keydown', e => {
  if (e.key === 'Enter') applyFilters();
});

// Keyboard shortcuts
// The YT iframe swallows keys when focused, so we periodically
// pull focus back to the document when the user isn't in an input.
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.shiftKey && e.key === 'N') playNext();
  if (e.shiftKey && e.key === 'P') playPrev();
  if (e.shiftKey && e.key === 'S') shuffleFiltered();
  if (e.shiftKey && e.key === 'R') randomDay();
});
// Reclaim focus from the YT iframe so keyboard shortcuts always work.
// When the iframe grabs focus, pull it back after a short delay
// (long enough for the click to register on the YT player controls).
setInterval(() => {
  if (document.activeElement && document.activeElement.tagName === 'IFRAME') {
    window.focus();
  }
}, 300);

init();
</script>
